apiVersion: networking.gke.io/v1alpha3
kind: FQDNNetworkPolicy
metadata:
  name: {{ .Release.Name }}
spec:
  egress:
    - ports:
        - port: 443
          protocol: TCP
      to:
        - fqdns:
            {{- range .Values.app.outbound.external }}
            - {{ . }}
            {{- end }}
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: aiven-audit
      app.kubernetes.io/name: aiven-audit
  policyTypes:
    - Egress
