  outbound:
    external:
      - api.aiven.io
  resources:
    limits:
      memory: 128Mi
      cpu: 200m
    requests:
      memory: 64Mi
      cpu: 100m
  replicas:
    min: 1
    max: 1
  secrets:
    aiven:
      pat: ""
  serviceaccount: ""
image:
  repository: europe-north1-docker.pkg.dev/nais-io/nais/images
  name: aiven-audit
  tag: "does_not_exist"

tenant:
  name: nav
