environmentKinds:
  - management
values:
  image.tag:
    description: Docker image tag
    config:
      type: string
  app.secrets.aiven.pat:
    displayName: Access token for the Aiven API
    computed:
      template: '"{{ .Env.aiven_application_token_aiven_audit }}"'
    config:
      type: string
      secret: true
  tenant.name:
    displayName: Tenant name
    computed:
      template: '"{{ .Tenant.Name }}"'
  app.serviceaccount:
    displayName: service account for aiven_audit
    computed:
      template: '"{{ .Env.aiven_audit_service_account }}"'
