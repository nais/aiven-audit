name: Go
on:
  workflow_dispatch:
  push:
    paths:
      - '**.go'
      - .github/workflows/main.yml
      - '.nais/*'
      - Dockerfile
      - go.mod
      - go.sum
    branches: [main]
env:
  docker_image: europe-north1-docker.pkg.dev/nais-io/nais/images/aiven-audit:${{ github.sha }}
jobs:
  check:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # ratchet:actions/checkout@v2
      - name: golangci-lint
        uses: golangci/golangci-lint-action@5c56cd6c9dc07901af25baab6f2b0d9f3b7c3018 # ratchet:golangci/golangci-lint-action@v2
  test:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # ratchet:actions/checkout@v2
      - name: Set up Go
        uses: actions/setup-go@bfdd3570ce990073878bf10f6b2d79082de49492 # ratchet:actions/setup-go@v2
        with:
          go-version: 1.17
      - name: Test
        run: go test -v ./...
  docker:
    needs: [check, test]
    runs-on: ubuntu-20.04
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - uses: nais/platform-build-push-sign@a31c0ad7e31ff154df50baa9c3a5d33b310e8209 # ratchet:nais/platform-build-push-sign@main
        id: build-push-sign
        with:
          name: aiven-audit
          google_service_account: gh-aiven-audit
          workload_identity_provider: ${{ secrets.NAIS_IO_WORKLOAD_IDENTITY_PROVIDER }}
          push: ${{ github.actor != 'dependabot[bot]' }}
  deploy:
    name: Deploy to prod-gcp
    needs: [docker]
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # ratchet:actions/checkout@v2
      - name: deploy to prod
        uses: nais/deploy/actions/deploy@e1d100f14637a6caa0aec40f5b5c7fd0c3ce500e # ratchet:nais/deploy/actions/deploy@v1
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: prod-gcp
          RESOURCE: .nais/nais.yaml
          VAR: image=${{ env.docker_image }},aiven_audit_pat=${{ secrets.AIVEN_AUDIT_PAT }}
