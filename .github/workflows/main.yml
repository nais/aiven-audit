name: Go

on:
  push:
    paths:
      - '**.go'
      - .github/workflows/main.yml
      - Dockerfile
      - go.mod
      - go.sum
    branches: [ main ]

env:
  docker_image: ghcr.io/nais/aiven-audit:${{ github.sha }}

jobs:
  check:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v2

  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: 1.17

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  docker:
    name: Build and push Docker image
    needs: [check, build]
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2

      - name: Build
        run: |
          docker image build --tag ${docker_image} .

      - uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: docker push ${docker_image}

  deploy:
    name: Deploy to dev-gcp
    needs: [docker]
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2

      - name: deploy to dev
        uses: nais/deploy/actions/deploy@v1
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: dev-gcp
          RESOURCE: .nais/nais.yaml
          VAR: image="${{ env.docker_image }}",aiven_audit_pat="${{ secrets.AIVEN_AUDIT_PAT }}"
