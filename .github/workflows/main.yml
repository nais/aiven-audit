name: Build and deploy

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"

env:
  RUNNER_IMG: "gcr.io/distroless/static-debian11:nonroot"
  BASEIMG_ID: "keyless@distroless.iam.gserviceaccount.com"
  BASEIMG_ISSUER: "https://accounts.google.com"
  FEATURE_NAME: "aiven-audit"
  GOOGLE_REGISTRY: "europe-north1-docker.pkg.dev"

jobs:
  build_push_sign:
    runs-on: ubuntu-20.04
    permissions:
      contents: read
      id-token: write
    outputs:
      version: "${{ steps.build_push_sign.outputs.version }}"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # ratchet:actions/checkout@v2
      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # ratchet:sigstore/cosign-installer@main
        with:
          cosign-release: 'v2.2.1'
      - name: Verify runner image
        run: cosign verify --certificate-identity ${{ env.BASEIMG_ID }} --certificate-oidc-issuer ${{ env.BASEIMG_ISSUER }} ${{ env.RUNNER_IMG }}
      - uses: nais/platform-build-push-sign@main # ratchet:exclude
        id: build_push_sign
        with:
          name: aiven-audit
          dockerfile: Dockerfile
          google_service_account: gh-aiven-audit
          push: true
          workload_identity_provider: ${{ secrets.NAIS_IO_WORKLOAD_IDENTITY_PROVIDER }}

  chart:
    permissions:
      contents: 'read'
      id-token: 'write'
    name: Build and push charts
    runs-on: ubuntu-latest
    needs:
      - build_push_sign
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # ratchet:actions/checkout@v3
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        if: github.ref == 'refs/heads/main'
        uses: 'google-github-actions/auth@71f986410dfbc7added4569d411d040a91dc6935' # ratchet:google-github-actions/auth@v2.1.8
        with:
          workload_identity_provider: ${{ secrets.NAIS_IO_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: 'gh-aiven-audit@nais-io.iam.gserviceaccount.com'
          token_format: 'access_token'
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a' # ratchet:google-github-actions/setup-gcloud@v1
      - name: 'Log in to Google Artifact Registry'
        if: github.ref == 'refs/heads/main'
        run: |-
          echo '${{ steps.auth.outputs.access_token }}' | docker login -u oauth2accesstoken --password-stdin https://${{ env.GOOGLE_REGISTRY }}
      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # ratchet:azure/setup-helm@v3
        name: 'Setup Helm'
        with:
          version: 'v3.12.0'
      - name: Set versions
        run: |-
          echo "Version: ${{ needs.build_push_sign.outputs.version }}"
          yq e '.version = "${{ needs.build_push_sign.outputs.version }}"' --inplace "./charts/aiven-audit/Chart.yaml"
          yq e '.appVersion = "${{ needs.build_push_sign.outputs.version }}"' --inplace "./charts/aiven-audit/Chart.yaml"
          yq e '.image.tag = "${{ needs.build_push_sign.outputs.version }}"' --inplace "./charts/aiven-audit/values.yaml"
      - name: Build Chart
        run: |-
          for chart in charts/*; do
            helm package "$chart"
          done
      - name: Push Chart
        if: github.ref == 'refs/heads/main'
        run: |-
          for chart in *.tgz; do
            helm push "$chart" oci://${{ env.GOOGLE_REGISTRY }}/nais-io/nais/feature
          done

  rollout:
    runs-on: fasit-deploy
    permissions:
      id-token: write
    needs:
      - build_push_sign
      - chart
    steps:
      - uses: nais/fasit-deploy@v2 # ratchet:exclude
        with:
          chart: oci://${{ env.GOOGLE_REGISTRY }}/nais-io/nais/feature/${{ env.FEATURE_NAME }}
          version: ${{ needs.build_push_sign.outputs.version }}
          feature_name: ${{ env.FEATURE_NAME }}
          