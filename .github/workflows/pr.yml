name: Test PRs

on:
  pull_request:
    types: [ opened, reopened, edited ]

jobs:
  build_and_test:
    runs-on: ubuntu-20.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # ratchet:actions/checkout@v2
      - run: docker build -t aiven-audit-test .