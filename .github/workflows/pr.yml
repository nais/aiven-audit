name: Test PRs

on:
  pull_request:
    types: [ opened, reopened, edited ]

jobs:
  build_and_test:
    runs-on: ubuntu-20.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # ratchet:actions/checkout@v2
      - run: docker build -t aiven-audit-test .