name: Test PRs

on:
  pull_request:
    types: [ opened, reopened, edited ]

jobs:
  build_and_test:
    runs-on: ubuntu-20.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac # ratchet:actions/checkout@v2
      - run: docker build -t aiven-audit-test .