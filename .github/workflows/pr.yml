name: Test PRs

on:
  pull_request:
    types: [ opened, reopened, edited ]

jobs:
  build_and_test:
    runs-on: ubuntu-20.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # ratchet:actions/checkout@v2
      - run: docker build -t aiven-audit-test .