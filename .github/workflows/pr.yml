name: Test PRs

on:
  pull_request:
    types: [ opened, reopened, edited ]

jobs:
  build_and_test:
    runs-on: ubuntu-20.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # ratchet:actions/checkout@v2
      - run: docker build -t aiven-audit-test .